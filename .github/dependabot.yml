version: 2

updates:
  # Scan for Python dependency updates in requirements.txt
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      prefix-development: "deps-dev"
    groups:
      # Bundle patch + minor bumps so the weekly run produces one PR per
      # ecosystem instead of one per dep. Security advisories and majors
      # still come as individual PRs (Dependabot default).
      pip-production:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      pip-development:
        dependency-type: "development"
        update-types: ["minor", "patch"]

  # Scan for Docker updates in Dockerfile (root directory)
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "docker"
    groups:
      docker:
        patterns: ["*"]
        update-types: ["minor", "patch"]

  # Include GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
        update-types: ["minor", "patch"]
